<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Página Simples</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .caixa {
      background: white;
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 { color: #333; }
    p  { color: #666; }

    button {
      margin-top: 1rem;
      padding: 0.6rem 1.5rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover { background: #4338ca; }

    #msg {
      margin-top: 1rem;
      color: #4f46e5;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="caixa">
    <h1>🌟 Olá!</h1>
    <p>Esta é uma página HTML bem simples.</p>
    <button onclick="clicar()">Clique aqui</button>
    <p id="msg"></p>
  </div>

  <script>
    function clicar() {
      document.getElementById('msg').textContent = '✅ Funcionou!';
    }
  </script>

</body>
</html>
